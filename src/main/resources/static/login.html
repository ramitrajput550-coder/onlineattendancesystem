<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduTrack</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center min-vh-100 fade-in">
        <div class="glass-panel" style="width: 100%; max-width: 450px;">
            <div class="text-center mb-4">
                <h2 class="text-gradient fw-bold"><i class="fas fa-lock"></i> Secure Login</h2>
                <p class="text-muted">Enter your credentials to access the dashboard</p>
            </div>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-bold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" id="username" class="form-control" placeholder="admin / teacher1 / student1" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-key text-muted"></i></span>
                        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                </div>
                
                <div id="errorMsg" class="alert alert-danger d-none" role="alert"></div>
                
                <button type="submit" class="btn btn-custom w-100 py-2" id="loginBtn">
                    Login <i class="fas fa-sign-in-alt ms-1"></i>
                </button>
            </form>
            <div class="text-center mt-3">
                <p class="text-muted mb-2">New user? 
                    <a href="register.html" class="fw-bold text-primary text-decoration-none">Student</a> |
                    <a href="teacher-register.html" class="fw-bold text-primary text-decoration-none">Teacher</a>
                </p>
                <a href="index.html" class="text-decoration-none text-muted"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';
            btn.disabled = true;
            errorMsg.classList.add('d-none');

            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    localStorage.setItem('user', JSON.stringify(data));
                    // Redirect based on role
                    if(data.role === 'ADMIN') window.location.href = 'admin-dashboard.html';
                    else if(data.role === 'TEACHER') window.location.href = 'teacher-dashboard.html';
                    else if(data.role === 'STUDENT') window.location.href = 'student-dashboard.html';
                } else {
                    errorMsg.innerText = data.message || 'Login failed';
                    errorMsg.classList.remove('d-none');
                }
            } catch (err) {
                errorMsg.innerText = 'Server error. Ensure Spring Boot is running.';
                errorMsg.classList.remove('d-none');
            } finally {
                btn.innerHTML = 'Login <i class="fas fa-sign-in-alt ms-1"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
