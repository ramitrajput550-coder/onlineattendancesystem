<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Registration - EduTrack</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center min-vh-100 fade-in">
        <div class="glass-panel" style="width: 100%; max-width: 500px;">
            <div class="text-center mb-4">
                <h2 class="text-gradient fw-bold"><i class="fas fa-chalkboard-teacher"></i> Teacher Registration</h2>
                <p class="text-muted">Join the EduTrack faculty portal</p>
            </div>
            
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label fw-bold">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-id-card text-muted"></i></span>
                        <input type="text" id="name" class="form-control" placeholder="Jane Smith" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Course / Subject</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-book text-muted"></i></span>
                        <select id="subject" class="form-select" required>
                            <option value="" disabled selected>Select your technical subject</option>
                            <option value="C++">C++</option>
                            <option value="Java">Java</option>
                            <option value="DSA">DSA (Data Structures & Algorithms)</option>
                            <option value="Python">Python</option>
                            <option value="PHP">PHP</option>
                            <option value="HTML">HTML / Web Design</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" id="username" class="form-control" placeholder="Choose a username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-key text-muted"></i></span>
                        <input type="password" id="password" class="form-control" placeholder="Create a password" required>
                    </div>
                </div>
                
                <div id="errorMsg" class="alert alert-danger d-none" role="alert"></div>
                <div id="successMsg" class="alert alert-success d-none" role="alert"></div>
                
                <button type="submit" class="btn btn-custom w-100 py-2" id="registerBtn">
                    Register as Teacher <i class="fas fa-check-circle ms-1"></i>
                </button>
            </form>
            <div class="text-center mt-3">
                <p class="text-muted mb-2">Already have an account? <a href="login.html" class="fw-bold text-primary text-decoration-none">Login Here</a></p>
                <a href="index.html" class="text-decoration-none text-muted"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';
            btn.disabled = true;
            errorMsg.classList.add('d-none');
            successMsg.classList.add('d-none');

            const payload = {
                name: document.getElementById('name').value,
                subject: document.getElementById('subject').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register/teacher`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    successMsg.innerText = 'Registration successful! Redirecting to login...';
                    successMsg.classList.remove('d-none');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorMsg.innerText = data.message || 'Registration failed';
                    errorMsg.classList.remove('d-none');
                    btn.innerHTML = 'Register as Teacher <i class="fas fa-check-circle ms-1"></i>';
                    btn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = 'Server error. Ensure Spring Boot is running.';
                errorMsg.classList.remove('d-none');
                btn.innerHTML = 'Register as Teacher <i class="fas fa-check-circle ms-1"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
